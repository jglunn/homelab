groups:
  - name: dns
    rules:
      # Blocky exposes the last-refresh time as a unix-timestamp gauge. The
      # metric name is `blocky_last_list_group_refresh_timestamp_seconds` on
      # Blocky v0.29; if an upgrade renames it, adjust here.
      # Blocky-down is covered by the generic `InstanceDown` rule in host.yml.
      - alert: BlocklistStale
        expr: (time() - blocky_last_list_group_refresh_timestamp_seconds) > 172800
        labels:
          severity: warning
        annotations:
          summary: "Blocky blocklists have not refreshed in >48h"
          description: "Group {{ $labels.group }} last refreshed {{ $value | humanizeDuration }} ago."
