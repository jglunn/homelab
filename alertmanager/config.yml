global:
  resolve_timeout: 5m

route:
  receiver: ntfy
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  routes:
    - matchers:
        - severity="critical"
      receiver: ntfy
      repeat_interval: 1h

receivers:
  - name: ntfy
    webhook_configs:
      - url: http://ntfy-bridge:8080/hook
        send_resolved: true
