# Blocky DNS resolver:
# - DoT upstream to Quad9 for encrypted resolution
# - Ad-blocking via StevenBlack's consolidated hosts list, refreshed every 24h
# - Prometheus metrics exposed on :4000/metrics

# bootstrapDns uses raw Quad9 IPs so the resolver can reach dns.quad9.net
# before any DNS is available (chicken-and-egg on first start).
bootstrapDns:
  - upstream: 9.9.9.9
  - upstream: 149.112.112.112

upstreams:
  groups:
    default:
      - tcp-tls:dns.quad9.net

blocking:
  denylists:
    ads:
      - https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts
  clientGroupsBlock:
    default: [ads]
  blockType: zeroIp
  loading:
    refreshPeriod: 24h

caching:
  minTime: 5m
  maxTime: 30m
  prefetching: true

ports:
  dns: 53
  http: 4000

log:
  level: info

prometheus:
  enable: true
  path: /metrics
